<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDXL Image Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 700px) {
      .container { grid-template-columns: 1fr; }
    }

    .panel {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea, input[type="text"], input[type="number"] {
      background: #0f0f13;
      border: 1px solid #2a2a35;
      border-radius: 7px;
      color: #e2e2e8;
      font-size: 0.9rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      font-family: inherit;
    }

    textarea:focus, input:focus {
      border-color: #7c3aed;
    }

    textarea { resize: vertical; min-height: 80px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .slider-value {
      color: #a78bfa;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #2a2a35;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #7c3aed;
      cursor: pointer;
      transition: background 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { background: #a78bfa; }

    button#generateBtn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    button#generateBtn:hover:not(:disabled) { opacity: 0.9; }
    button#generateBtn:active:not(:disabled) { transform: scale(0.98); }
    button#generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-panel {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .output-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 3rem 2rem;
      color: #4b5563;
      min-height: 420px;
    }

    .output-placeholder svg { opacity: 0.3; }

    #imageContainer {
      position: relative;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #outputImage {
      display: none;
      width: 100%;
      height: auto;
      border-radius: 0;
    }

    .spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .spinner.active { display: flex; }

    .spin {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a35;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .meta {
      padding: 0.75rem 1rem;
      border-top: 1px solid #2a2a35;
      display: none;
      gap: 1.5rem;
      font-size: 0.78rem;
      color: #6b7280;
      flex-wrap: wrap;
    }

    .meta.visible { display: flex; }

    .meta span b { color: #a78bfa; }

    .download-btn {
      margin-left: auto;
      padding: 0.3rem 0.75rem;
      background: #2a2a35;
      border: 1px solid #3a3a48;
      border-radius: 6px;
      color: #e2e2e8;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .download-btn:hover { background: #3a3a48; }

    .error-msg {
      display: none;
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 0.75rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <h1>Image Generator</h1>
  <p class="subtitle" id="subtitle">loading model info...</p>

  <div class="container">
    <!-- Controls -->
    <div class="panel">
      <label>
        Prompt
        <textarea id="prompt" rows="4" placeholder="A majestic mountain landscape at golden hour, photorealistic, 8k..."></textarea>
      </label>

      <label id="negPromptLabel">
        Negative Prompt
        <textarea id="negPrompt" rows="2" placeholder="blurry, low quality, watermark..."></textarea>
      </label>

      <div class="row">
        <label>
          Width
          <input type="number" id="width" value="1024" min="512" max="2048" step="64" />
        </label>
        <label>
          Height
          <input type="number" id="height" value="1024" min="512" max="2048" step="64" />
        </label>
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <span>Steps</span>
          <span class="slider-value" id="stepsVal">30</span>
        </div>
        <input type="range" id="steps" min="1" max="100" value="30"
          oninput="document.getElementById('stepsVal').textContent = this.value" />
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <span>Guidance Scale (CFG)</span>
          <span class="slider-value" id="cfgVal">7.5</span>
        </div>
        <input type="range" id="cfg" min="1" max="20" step="0.5" value="7.5"
          oninput="document.getElementById('cfgVal').textContent = parseFloat(this.value).toFixed(1)" />
      </div>

      <label>
        Seed (blank = random)
        <input type="number" id="seed" placeholder="leave blank for random" />
      </label>

      <button id="generateBtn" onclick="generate()">Generate</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Output -->
    <div class="output-panel">
      <div id="imageContainer">
        <div class="output-placeholder" id="placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="m21 15-5-5L5 21"/>
          </svg>
          <span>Your image will appear here</span>
        </div>
        <div class="spinner" id="spinner">
          <div class="spin"></div>
          <span id="spinnerText">Generating...</span>
        </div>
        <img id="outputImage" alt="Generated image" />
      </div>
      <div class="meta" id="meta">
        <span><b>Seed</b> <span id="metaSeed">—</span></span>
        <span><b>Time</b> <span id="metaTime">—</span></span>
        <span><b>Size</b> <span id="metaSize">—</span></span>
        <a class="download-btn" id="downloadBtn" href="#" download="sdxl_output.png">Download</a>
      </div>
    </div>
  </div>

  <script>
    let generating = false;
    let timer = null;
    let elapsed = 0;
    let modelInfo = {};

    async function loadModelInfo() {
      try {
        const res = await fetch('/info');
        if (!res.ok) return;
        modelInfo = await res.json();
        const name = modelInfo.model_path || 'unknown';
        const cls = modelInfo.pipeline_class || '';
        document.getElementById('subtitle').textContent = `${name} \u2022 ${cls} \u2022 running locally`;
        if (modelInfo.supports_negative_prompt === false) {
          document.getElementById('negPromptLabel').style.display = 'none';
        }
      } catch (_) {}
    }

    loadModelInfo();

    async function generate() {
      if (generating) return;

      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        showError('Please enter a prompt.');
        return;
      }
      hideError();

      const btn = document.getElementById('generateBtn');
      const placeholder = document.getElementById('placeholder');
      const spinner = document.getElementById('spinner');
      const img = document.getElementById('outputImage');
      const meta = document.getElementById('meta');

      generating = true;
      btn.disabled = true;
      btn.textContent = 'Generating...';
      placeholder.style.display = 'none';
      img.style.display = 'none';
      meta.classList.remove('visible');
      spinner.classList.add('active');

      elapsed = 0;
      document.getElementById('spinnerText').textContent = 'Generating... 0s';
      timer = setInterval(() => {
        elapsed++;
        document.getElementById('spinnerText').textContent = `Generating... ${elapsed}s`;
      }, 1000);

      const seedVal = document.getElementById('seed').value;
      const body = {
        prompt,
        negative_prompt: document.getElementById('negPrompt').value.trim(),
        width: parseInt(document.getElementById('width').value),
        height: parseInt(document.getElementById('height').value),
        num_inference_steps: parseInt(document.getElementById('steps').value),
        guidance_scale: parseFloat(document.getElementById('cfg').value),
      };
      if (seedVal !== '') body.seed = parseInt(seedVal);

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || 'Generation failed');
        }

        const data = await res.json();
        const src = `data:image/png;base64,${data.image_base64}`;
        img.src = src;
        img.style.display = 'block';

        document.getElementById('metaSeed').textContent = data.seed;
        document.getElementById('metaTime').textContent = `${data.elapsed_seconds}s`;
        document.getElementById('metaSize').textContent = `${body.width}×${body.height}`;
        document.getElementById('downloadBtn').href = src;
        document.getElementById('seed').value = data.seed;
        meta.classList.add('visible');
      } catch (e) {
        showError(e.message);
        placeholder.style.display = 'flex';
      } finally {
        clearInterval(timer);
        spinner.classList.remove('active');
        generating = false;
        btn.disabled = false;
        btn.textContent = 'Generate';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    // Allow Ctrl+Enter to generate
    document.getElementById('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
    });
  </script>
</body>
</html>
